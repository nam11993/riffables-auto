feature: "theme-customization"
source_prd:
  title: "Conversational Widget Theme Customizer"
  source_type: "github-issues"
  url: "https://github.com/speedrun-labs/riffables-prd/issues/9"
  version_or_commit: "github-issues-read-2026-07-09"
  last_reviewed_at: "2026-07-09"
  related_issues:
    - id: "#9"
      title: "Vision: Conversational Customization"
      url: "https://github.com/speedrun-labs/riffables-prd/issues/9"
    - id: "#5"
      title: "Epic: Conversational Widget Theme Customizer"
      url: "https://github.com/speedrun-labs/riffables-prd/issues/5"

requirements:
  - id: "REQ-THEME-001"
    title: "Creator can request widget style changes through chat"
    description: "Creators must be able to describe widget style changes in natural language through a theme assistant in the console."
    prd_section: "Issue #9 Mechanic; Issue #5 Mechanic"
    source_issues:
      - "#9"
      - "#5"
    priority: "should"
    type: "functional"
    status: "draft"
    acceptance_criteria:
      - "The console exposes a conversational theme assistant."
      - "The creator can submit natural language style requests."
      - "The assistant maps supported requests to widget style configuration."
      - "Unsupported requests are handled with clear feedback."
    assumptions: []
    open_questions:
      - "Which model or agent owns theme request interpretation?"
    related_requirements:
      - "REQ-THEME-002"

  - id: "REQ-THEME-002"
    title: "Widget preview updates when theme settings change"
    description: "The widget preview simulator must update to show theme changes generated by the assistant."
    prd_section: "Issue #9 Surfaces affected; Issue #5 Acceptance Criteria"
    source_issues:
      - "#9"
      - "#5"
    priority: "should"
    type: "ui"
    status: "draft"
    acceptance_criteria:
      - "A supported theme request changes the preview configuration."
      - "The preview visibly reflects the updated style settings."
      - "The preview update occurs without requiring a full manual rebuild."
      - "The creator can judge the change before saving."
    assumptions: []
    open_questions:
      - "What latency is acceptable for preview updates?"
    related_requirements:
      - "REQ-THEME-003"

  - id: "REQ-THEME-003"
    title: "Creator can save supported widget theme styles"
    description: "Supported theme changes must be persisted to the creator profile or widget configuration when the creator saves."
    prd_section: "Issue #5 Acceptance Criteria"
    source_issues:
      - "#5"
    priority: "should"
    type: "functional"
    status: "draft"
    acceptance_criteria:
      - "The creator can save generated theme changes."
      - "Saved theme settings persist after refresh or revisit."
      - "Saved settings apply to the relevant widget or public surface."
      - "Failed saves show a clear error and do not silently lose changes."
    assumptions: []
    open_questions:
      - "Where exactly are theme settings persisted?"
    related_requirements:
      - "REQ-THEME-002"

  - id: "REQ-THEME-004"
    title: "Theme assistant only changes allowed style variables"
    description: "The assistant must restrict generated style changes to an approved allowlist of safe style variables."
    prd_section: "Issue #5 Locked Constants"
    source_issues:
      - "#5"
    priority: "must"
    type: "security"
    status: "draft"
    acceptance_criteria:
      - "Only allowed CSS variables can be changed by assistant output."
      - "Unsupported style variables are ignored or rejected."
      - "The allowed variables include primary color, background color, border radius, and font family unless changed."
      - "The assistant does not emit arbitrary styles outside the allowlist."
    assumptions:
      - "ALLOWED_CSS_VARIABLES contains primary-color, bg-color, border-radius, and font-family unless changed."
    open_questions:
      - "What exact variable names are used in the current implementation?"
    related_requirements:
      - "REQ-THEME-005"

  - id: "REQ-THEME-005"
    title: "Theme assistant rejects malicious script requests"
    description: "The assistant must refuse requests that attempt to inject script tags, arbitrary JavaScript, or unsafe code into the widget."
    prd_section: "Issue #5 Acceptance Criteria; Issue #9 Scope exclusions"
    source_issues:
      - "#5"
      - "#9"
    priority: "must"
    type: "security"
    status: "draft"
    acceptance_criteria:
      - "Requests to add script tags are refused."
      - "Requests to inject arbitrary JavaScript are refused."
      - "Unsafe code is not saved into widget configuration."
      - "The refusal is clear and does not expose sensitive implementation details."
    assumptions: []
    open_questions:
      - "Should refusal messages follow a standard safety copy pattern?"
    related_requirements:
      - "REQ-THEME-004"

review_notes:
  status: "draft"
  recommended_reviewers:
    - "QA"
    - "Product"
    - "Design"
    - "Security"
  qa_review_focus:
    - "Confirm supported theme variables."
    - "Prepare positive and malicious prompt test data."
    - "Confirm save and preview behavior."
