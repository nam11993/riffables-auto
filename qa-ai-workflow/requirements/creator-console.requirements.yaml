    - "Product"
    - "Design"
    - "Engineering"
  qa_review_focus:
    - "Confirm console route/module names."
    - "Confirm curation editable fields."
    - "Confirm crawl feedback data contract."
    - "Confirm Google OAuth readiness because #70 is closed while #71 remains open in the latest PRD intake."
    - "Confirm console API wiring acceptance paths for #51."
