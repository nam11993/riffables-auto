        test_design_action: "include"
      - id: "REQ-INGEST-002"
        title: "New content from registered sources is automatically imported"
        priority: "must"
        type: "functional"
        test_design_action: "include"
      - id: "REQ-INGEST-003"
        title: "Ingestion jobs expose processing states in the console"
        priority: "must"
        type: "functional"
        test_design_action: "include"
      - id: "REQ-INGEST-004"
        title: "Large media files are processed without timeout or crash"
        priority: "must"
        type: "non-functional"
        test_design_action: "include_with_test_data_or_mock_strategy"
      - id: "REQ-INGEST-005"
        title: "Transcription separates speakers in raw transcripts"
        priority: "must"
        type: "functional"
        test_design_action: "include_with_golden_media_dataset"
      - id: "REQ-INGEST-006"
