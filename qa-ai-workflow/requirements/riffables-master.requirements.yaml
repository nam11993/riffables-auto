open_questions_to_resolve_before_approval:
  - module: "ingestion-pipeline"
    questions:
      - "Which exact URL formats are valid for each supported source type?"
      - "What retry count and retry backoff should be used for test expectations?"
      - "What is the minimum acceptable speaker separation accuracy?"
  - module: "controlled-ingestion"
    questions:
      - "What exact API error should be returned when refusing automatic ingest for Manual channels?"
      - "What batch size should be locked for V1.1 tests?"
      - "How can QA observe or simulate queue fairness and service restart recovery?"
  - module: "ai-extraction-citation"
    questions:
      - "Are filler-word differences allowed in verified quotes?"
      - "Should old insights be deleted, archived, or versioned after re-extraction?"
  - module: "search-public-site"
    questions:
      - "What golden dataset should QA use to judge semantic relevance?"
      - "Is audience member gating in scope for this release?"
      - "What timestamp tolerance is acceptable for citation playback?"
      - "Which creator or tenant fields should be used when the public site needs guest/show labels?"
  - module: "creator-console"
    questions:
      - "What is the final list of top-level console routes for V1?"
      - "Which curation fields are editable?"
      - "Is Google OAuth fully testable in QA while issue #71 is still open, or should full round-trip remain blocked?"
      - "What environment host and callback URI should QA use for deployed Google OAuth validation?"
      - "What exact backend API routes should be exposed in the console for #51 acceptance?"
  - module: "site-builder-onboarding"
    questions:
      - "Which natural-language edit operations are supported by the site-editor Assistant for issue #66?"
      - "What is the QA oracle for accepting or rejecting an AI-generated previewable diff?"
  - module: "theme-customization"
    questions:
      - "What exact style variable names are allowed?"
      - "Should refusal messages follow a standard safety copy pattern?"
  - module: "accessibility-ux"
    questions:
      - "Should QA measure rendered visual size or actual hit area for tap targets?"
      - "Which dashboard/editor screens are in accessibility scope?"

