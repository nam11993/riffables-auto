feature: "riffables-master"
source_prd:
  title: "Riffables PRD issue set"
  source_type: "github-issues"
  url: "https://github.com/speedrun-labs/riffables-prd/issues"
  version_or_commit: "github-issues-read-2026-07-16"
  last_reviewed_at: "2026-07-16"

purpose: "Curated master requirement set used as the input for test plan and test case generation."
status: "draft_for_qa_review"

curation_policy:
  source_of_truth_for_test_design: true
  detailed_acceptance_criteria_location: "Use each module source_file for full acceptance_criteria, assumptions, open_questions, and related_requirements."
  included_requirement_rule: "Include only requirements that describe observable product behavior, security behavior, accessibility behavior, or regression behavior that QA can validate."
  excluded_from_direct_test_case_generation:
    - id: "REQ-GLOBAL-001"
      reason: "Coverage governance, not a directly testable product behavior."
    - id: "REQ-GLOBAL-002"
      reason: "Coverage governance, not a directly testable product behavior."
    - id: "REQ-GLOBAL-003"
      reason: "Coverage governance, not a directly testable product behavior."
    - id: "REQ-GLOBAL-004"
      reason: "Release gate governance. Use for test exit criteria, not as a normal feature test case source."
  review_gate:
    current_state: "draft"
    next_state: "reviewed"
    approval_rule: "QA/Product/Engineering should review the requirement IDs, scope, and open questions before test cases are treated as official."

test_plan_generation_order:
  - "tenant-security"
  - "ingestion-pipeline"
  - "controlled-ingestion"
  - "ai-extraction-citation"
  - "search-public-site"
  - "creator-console"
  - "site-builder-onboarding"
  - "theme-customization"
  - "accessibility-ux"

scope_summary:
  total_included_requirements: 74
  excluded_governance_requirements: 4
  release_scope_requirements: 33
  regression_baseline_requirements: 41
  notes:
    - "Closed PRD issues are kept as regression baseline when they describe behavior already delivered or previously fixed."
    - "Open PRD issues are treated as release scope unless the item is explicitly marked could/deferred by priority."
    - "The 2026-07-16 PRD intake added issues #66-#72 and moved #18-#32, #34, #45, #51, and #59 into regression baseline or updated release risk."
    - "This master file is an index and curation layer; detailed acceptance criteria remain in the module requirement files."

modules:
  - key: "tenant-security"
    name: "Multi-tenant isolation and role security"
    source_file: "qa-ai-workflow/requirements/tenant-security.requirements.yaml"
    source_issues: ["#10", "#42"]
    test_scope: "regression_baseline"
    qa_priority: "P0"
    requirements:
      - id: "REQ-TENANT-001"
        title: "All tenant data access is scoped to the authenticated tenant"
        priority: "must"
        type: "security"
        test_design_action: "include"
      - id: "REQ-TENANT-002"
        title: "Direct URL or API access cannot bypass tenant isolation"
        priority: "must"
        type: "security"
        test_design_action: "include"
      - id: "REQ-TENANT-003"
        title: "Team roles control tenant actions"
        priority: "must"
        type: "security"
        test_design_action: "include"
      - id: "REQ-TENANT-004"
        title: "Operational logs avoid exposing other tenant data"
        priority: "should"
        type: "security"
        test_design_action: "include_as_security_review_or_regression"

  - key: "ingestion-pipeline"
    name: "Pluggable ingestion pipeline V1"
