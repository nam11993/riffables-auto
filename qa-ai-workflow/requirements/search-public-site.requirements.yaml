feature: "search-public-site"
source_prd:
  title: "Hybrid Discovery Engine and Public Audience Site"
  source_type: "github-issues"
  url: "https://github.com/speedrun-labs/riffables-prd/issues/8"
  version_or_commit: "github-issues-read-2026-07-16"
  last_reviewed_at: "2026-07-16"
  related_issues:
    - id: "#8"
      title: "Vision: Hybrid Discovery Engine"
      url: "https://github.com/speedrun-labs/riffables-prd/issues/8"
    - id: "#4"
      title: "Epic: Hybrid pgvector & RRF Discovery"
      url: "https://github.com/speedrun-labs/riffables-prd/issues/4"
    - id: "#16"
      title: "Vision: Public Audience Site"
      url: "https://github.com/speedrun-labs/riffables-prd/issues/16"
    - id: "#14"
      title: "Epic: Public Audience Site"
      url: "https://github.com/speedrun-labs/riffables-prd/issues/14"
    - id: "#17"
      title: "Task: Fix Published Public Site"
      url: "https://github.com/speedrun-labs/riffables-prd/issues/17"
    - id: "#59"
      title: "Task: Replace the synthetic guest/show labels on the audience site"
