      url: "https://github.com/speedrun-labs/riffables-prd/issues/19"
    - id: "#20"
      title: "Epic: Channel video catalog & curation"
      url: "https://github.com/speedrun-labs/riffables-prd/issues/20"
    - id: "#22"
      title: "Epic: Crawl progress, cancellation, and fair processing"
      url: "https://github.com/speedrun-labs/riffables-prd/issues/22"
    - id: "#23"
      title: "Task: Creator picks ingest mode when connecting a channel"
      url: "https://github.com/speedrun-labs/riffables-prd/issues/23"
    - id: "#24"
